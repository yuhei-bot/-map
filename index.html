<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Field Pro Custom - Search & Focus</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #0f172a; }
        #map { position: fixed; top: 0; bottom: 0; width: 100%; z-index: 1; }
        .custom-tooltip { background: rgba(0,0,0,0.9); color: white; border: none; border-radius: 8px; padding: 6px 12px; font-size: 14px; }
        .icon-choice.selected { border: 3px solid #3b82f6; background: #1e293b; transform: scale(1.1); }
        .img-pin { border: 2px solid white; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); object-fit: cover; }
        .emoji-pin { font-size: 32px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.4)); text-align: center; }
    </style>
</head>
<body>

    <div id="map"></div>

    <!-- UI: 中央配置のコンパクト検索バー -->
    <div class="fixed top-6 left-0 right-0 z-[1000] flex flex-col items-center pointer-events-none space-y-4">
        <div class="pointer-events-auto w-64 sm:w-80">
            <input id="search-input" type="text" placeholder="地点を検索..." 
                   class="w-full bg-white/80 backdrop-blur-xl border border-white/20 px-4 py-2 rounded-full text-slate-900 shadow-xl outline-none focus:ring-2 focus:ring-blue-500 text-xs text-center"
                   oninput="searchMemos()">
        </div>
        
        <div class="pointer-events-auto">
            <button onclick="requestCurrentLocation()" 
                    class="bg-blue-600/90 backdrop-blur-md text-white px-4 py-2 rounded-full text-[10px] font-bold shadow-lg active:scale-95 transition-all flex items-center gap-1">
                📍 現在地を記録
            </button>
        </div>
    </div>

    <!-- 編集モーダル -->
    <div id="editor-modal" class="fixed inset-0 z-[2000] bg-black/80 hidden flex items-center justify-center p-6 backdrop-blur-sm">
        <div class="bg-slate-900 w-full max-w-sm p-6 rounded-3xl border border-white/10 space-y-4 text-white shadow-2xl">
            <div class="flex justify-between items-center">
                <h2 class="font-bold text-sm">地点の編集</h2>
                <button onclick="deletePoint()" id="delete-btn" class="text-red-500 text-[10px] font-bold px-2 py-1 bg-red-500/10 rounded-md hidden">🗑 削除</button>
            </div>

            <div class="space-y-2">
                <div class="flex justify-between items-center text-[9px] uppercase font-bold text-slate-500 tracking-widest">
                    <span>アイコンを選択</span>
                    <button onclick="addNewIcon()" class="text-blue-400">+ 追加</button>
                </div>
                <div class="flex flex-wrap gap-2 bg-slate-800/50 p-3 rounded-2xl max-h-24 overflow-y-auto border border-white/5" id="icon-selector"></div>
            </div>

            <input id="memo-input" type="text" placeholder="メモを入力..." 
                   class="w-full bg-slate-800/80 border-none p-3 rounded-xl text-white text-sm outline-none">
            
            <div class="space-y-2">
                <p class="text-slate-500 text-[9px] uppercase font-bold tracking-widest">写真・動画</p>
                <input id="file-input" type="file" accept="image/*,video/*" class="hidden">
                <button onclick="document.getElementById('file-input').click()" class="w-full bg-slate-700/50 py-2 rounded-xl text-xs font-medium">📷 メディアを選択</button>
                <div id="media-preview" class="w-full h-24 rounded-xl bg-black/50 hidden items-center justify-center overflow-hidden border border-white/5 relative"></div>
            </div>

            <div class="flex gap-2 pt-1">
                <button onclick="closeModal()" class="flex-1 text-slate-400 py-3 text-xs font-bold">戻る</button>
                <button onclick="savePoint()" class="flex-1 bg-blue-600 py-3 rounded-xl text-xs font-bold shadow-lg">保存</button>
            </div>
        </div>
    </div>

    <script>
        let customIcons = JSON.parse(localStorage.getItem('my_icons') || '["📍", "🚧", "🚛", "🅿️", "⚠️", "🏠"]');
        const map = L.map('map', { zoomControl: false }).setView([35.6812, 139.7671], 15);
        L.tileLayer('https://{s}.tile.osm.org/{z}/{x}/{y}.png').addTo(map);

        let tempLatLng = null, editingId = null, selectedFileUrl = null, selectedFileType = null, currentIcon = customIcons[0], markers = [];
        let fieldData = JSON.parse(localStorage.getItem('field_archive_v5') || '[]');

        renderIconSelector();
        refreshMap();

        function renderIconSelector() {
            const s = document.getElementById('icon-selector');
            s.innerHTML = customIcons.map(i => `<button onclick="selectIcon('${i}')" class="icon-choice p-2 text-xl rounded-lg" data-icon="${i}">${i}</button>`).join('');
        }

        function addNewIcon() {
            const n = prompt("追加したい絵文字を入力：");
            if (n && !customIcons.includes(n)) {
                customIcons.push(n);
                localStorage.setItem('my_icons', JSON.stringify(customIcons));
                renderIconSelector();
                selectIcon(n);
            }
        }

        function selectIcon(i) {
            currentIcon = i;
            document.querySelectorAll('.icon-choice').forEach(el => el.classList.toggle('selected', el.dataset.icon === i));
        }

        function openModal(id) {
            editingId = id;
            if (id !== null) {
                const d = fieldData.find(x => x.id === id);
                document.getElementById('memo-input').value = d.text;
                selectIcon(d.icon);
                selectedFileUrl = d.media;
                selectedFileType = d.type;
                document.getElementById('delete-btn').classList.remove('hidden');
                updatePreview();
            } else {
                document.getElementById('memo-input').value = "";
                selectIcon(customIcons[0]);
                selectedFileUrl = null;
                document.getElementById('delete-btn').classList.add('hidden');
                document.getElementById('media-preview').classList.add('hidden');
            }
            document.getElementById('editor-modal').classList.remove('hidden');
        }

        function addMarker(d) {
            let iconHtml = "", iconSize = [32, 32], iconAnchor = [16, 32];
            if (d.media && d.type === 'image') {
                iconHtml = `<img src="${d.media}" class="img-pin w-full h-full">`;
                iconSize = [40, 40]; iconAnchor = [20, 20];
            } else {
                iconHtml = `<div class="emoji-pin">${d.icon || '📍'}</div>`;
            }
            const m = L.marker([d.lat, d.lng], { icon: L.divIcon({ html: iconHtml, className: 'dummy', iconSize, iconAnchor }) }).addTo(map);
            m.bindTooltip(d.text, { direction: 'top', className: 'custom-tooltip' });
            m.on('click', (e) => { 
                L.DomEvent.stopPropagation(e); 
                tempLatLng = m.getLatLng(); 
                openModal(d.id); 
            });
            markers.push({ data: d, marker: m });
        }

        // 検索関数：入力に合わせて地図移動 ＋ ツールチップ ＋ モーダルオープン
        function searchMemos() {
            const q = document.getElementById('search-input').value.toLowerCase();
            if (q.length > 0) {
                markers.forEach(m => {
                    if (m.data.text.toLowerCase().includes(q)) {
                        map.panTo(m.marker.getLatLng());
                        m.marker.openTooltip();
                        openModal(m.data.id); // 詳細画面を自動で開く
                    }
                });
            }
        }

        function savePoint() {
            const t = document.getElementById('memo-input').value || "無題";
            const p = { id: editingId || Date.now(), lat: tempLatLng.lat, lng: tempLatLng.lng, text: t, icon: currentIcon, media: selectedFileUrl, type: selectedFileType };
            if (editingId !== null) { fieldData[fieldData.findIndex(x => x.id === editingId)] = p; } else { fieldData.push(p); }
            localStorage.setItem('field_archive_v5', JSON.stringify(fieldData));
            refreshMap(); closeModal();
        }

        function clearMedia() { selectedFileUrl = null; selectedFileType = null; document.getElementById('media-preview').classList.add('hidden'); }
        function refreshMap() { markers.forEach(m => map.removeLayer(m.marker)); markers = []; fieldData.forEach(addMarker); }
        function deletePoint() { if(confirm("削除？")){ fieldData=fieldData.filter(x=>x.id!==editingId); localStorage.setItem('field_archive_v5', JSON.stringify(fieldData)); refreshMap(); closeModal(); }}
        
        function updatePreview() { 
            const p = document.getElementById('media-preview'); 
            if(selectedFileUrl){ 
                p.innerHTML = selectedFileType === 'video' ? `<video src="${selectedFileUrl}" class="h-full w-full object-cover"></video>` : `<img src="${selectedFileUrl}" class="h-full w-full object-cover">`; 
                p.innerHTML += `<button onclick="clearMedia()" class="absolute top-1 right-1 bg-black/50 rounded-full p-1 text-[10px]">✕</button>`;
                p.classList.replace('hidden', 'flex'); 
            } else { p.classList.add('hidden'); }
        }

        document.getElementById('file-input').onchange = (e) => { 
            const f = e.target.files[0]; 
            if(f){ 
                selectedFileType = f.type.startsWith('video')?'video':'image'; 
                const r = new FileReader(); 
                r.onload=(ev)=>{selectedFileUrl=ev.target.result; updatePreview();}; 
                r.readAsDataURL(f); 
            }
        };

        function closeModal() { document.getElementById('editor-modal').classList.add('hidden'); }
        function requestCurrentLocation() { navigator.geolocation.getCurrentPosition(pos => { tempLatLng = { lat: pos.coords.latitude, lng: pos.coords.longitude }; map.setView(tempLatLng, 18); openModal(null); }); }
        map.on('click', (e) => { tempLatLng = e.latlng; openModal(null); });
    </script>
</body>
</html>
